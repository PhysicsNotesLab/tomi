<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Nucleus glow -->
    <radialGradient id="nucGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </radialGradient>
    <filter id="nucGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Electron glows -->
    <filter id="e1Glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="e2Glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="e3Glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="e1Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#e74c3c"/>
    </radialGradient>
    <radialGradient id="e2Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#3498db"/>
    </radialGradient>
    <radialGradient id="e3Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#f1c40f"/>
    </radialGradient>
  </defs>

  <!-- Orbit 1: rotated -30deg -->
  <ellipse cx="50" cy="50" rx="42" ry="16"
           fill="none" stroke="rgba(231,76,60,0.28)" stroke-width="1.2"
           transform="rotate(-30 50 50)"/>

  <!-- Orbit 2: rotated +30deg -->
  <ellipse cx="50" cy="50" rx="42" ry="16"
           fill="none" stroke="rgba(52,152,219,0.28)" stroke-width="1.2"
           transform="rotate(30 50 50)"/>

  <!-- Orbit 3: rotated 90deg (vertical) -->
  <ellipse cx="50" cy="50" rx="42" ry="16"
           fill="none" stroke="rgba(241,196,15,0.28)" stroke-width="1.2"
           transform="rotate(90 50 50)"/>

  <!-- Nucleus -->
  <circle cx="50" cy="50" r="8" fill="url(#nucGrad)" filter="url(#nucGlow)">
    <animate attributeName="r" values="8;9.2;8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Electron 1 (red) — orbit 1, -30deg tilt -->
  <circle r="4.5" fill="url(#e1Grad)" filter="url(#e1Glow)">
    <animateMotion dur="2.2s" repeatCount="indefinite">
      <mpath href="#path1"/>
    </animateMotion>
  </circle>

  <!-- Electron 2 (blue) — orbit 2, +30deg tilt -->
  <circle r="4.5" fill="url(#e2Grad)" filter="url(#e2Glow)">
    <animateMotion dur="2.8s" repeatCount="indefinite" keyPoints="0.5;1;0.5;0;0.5" keyTimes="0;0.25;0.5;0.75;1" calcMode="linear">
      <mpath href="#path2"/>
    </animateMotion>
  </circle>

  <!-- Electron 3 (yellow) — orbit 3, 90deg -->
  <circle r="4.5" fill="url(#e3Grad)" filter="url(#e3Glow)">
    <animateMotion dur="3.4s" repeatCount="indefinite">
      <mpath href="#path3"/>
    </animateMotion>
  </circle>

  <!-- Motion paths (invisible) -->
  <defs>
    <path id="path1" d="M 92 50 A 42 16 0 1 1 8 50 A 42 16 0 1 1 92 50"
          transform="rotate(-30 50 50)"/>
    <path id="path2" d="M 92 50 A 42 16 0 1 1 8 50 A 42 16 0 1 1 92 50"
          transform="rotate(30 50 50)"/>
    <path id="path3" d="M 92 50 A 42 16 0 1 1 8 50 A 42 16 0 1 1 92 50"
          transform="rotate(90 50 50)"/>
  </defs>
</svg>
