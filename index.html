<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <title>Portal Física UNAL</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="spa-layout">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">

    <!-- Logo con átomo animado -->
    <div class="sidebar-logo">
      <div class="atom-container">
        <div class="nucleus"></div>
        <div class="orbit orbit-1"><div class="electron e1"></div></div>
        <div class="orbit orbit-2"><div class="electron e2"></div></div>
        <div class="orbit orbit-3"><div class="electron e3"></div></div>
      </div>
      <h2>LAB · FÍSICA UNAL</h2>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav" id="sidebarNav">

      <div class="nav-section-label">NAVEGACIÓN</div>

      <button class="nav-item" data-route="dashboard">
        <i class="fa-solid fa-satellite-dish"></i>
        Centro de Control
      </button>

      <!-- Semestres accordion -->
      <button class="nav-accordion-btn" id="semAccordionToggle">
        <i class="fa-solid fa-layer-group icon"></i>
        Semestres
        <i class="fa-solid fa-chevron-down chevron"></i>
      </button>
      <div class="nav-accordion-body" id="sidebarAccordionBody">
        <!-- Populated by app.js -->
      </div>

      <div class="nav-section-label">HERRAMIENTAS</div>

      <button class="nav-item" data-route="documents">
        <i class="fa-solid fa-folder-open"></i>
        Todos los documentos
      </button>

      <button class="nav-item" data-route="stats">
        <i class="fa-solid fa-chart-line"></i>
        Estadísticas
      </button>

    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="user-block">
        <div class="user-avatar" id="userAvatar">T</div>
        <span class="user-email" id="userEmail">cargando...</span>
      </div>
      <button class="btn-logout" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        CERRAR SESIÓN
      </button>
    </div>

  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main-wrap">

    <!-- Topbar -->
    <header class="topbar">
      <button class="btn-hamburger" id="hamburgerBtn">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="topbar-info">
        <h1 id="topbarTitle">CENTRO DE CONTROL</h1>
        <p  id="topbarSub">Portal personal — Carrera de Física</p>
      </div>
    </header>

    <!-- Dynamic page content -->
    <main class="page" id="appContent">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </main>

  </div>

</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- ============ MODAL: CRUD MATERIAS ============ -->
<div class="modal-overlay" id="subjectModal">
  <div class="modal-content">
    <h2 id="modalTitle">Agregar materia</h2>

    <label for="modalName">Nombre de la materia</label>
    <input type="text" id="modalName" placeholder="Ej: Mecánica Cuántica I" autocomplete="off"/>

    <label for="modalDesc">Descripción corta</label>
    <input type="text" id="modalDesc" placeholder="Ej: Marco conceptual / módulo teórico" autocomplete="off"/>

    <label for="modalCredits">Créditos</label>
    <input type="number" id="modalCredits" min="1" max="12" value="3"/>

    <label for="modalTag">Categoría</label>
    <select id="modalTag">
      <option>Teoría</option>
      <option>Laboratorio</option>
      <option>Cálculo</option>
      <option>Matemáticas</option>
      <option>Optativa</option>
      <option>Taller</option>
      <option>Idiomas</option>
      <option>Investigación</option>
      <option>Seminario</option>
      <option>Electiva</option>
      <option>Tesis</option>
      <option>General</option>
    </select>

    <label>Icono</label>
    <div class="icon-selector">
      <i class="fa-solid fa-atom" id="modalIconPreview"></i>
      <select id="modalIcon">
        <!-- Poblado por app.js con ICON_OPTIONS -->
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" id="btnModalSave">
        <i class="fa-solid fa-floppy-disk"></i> Guardar
      </button>
      <button class="btn-secondary" id="btnModalCancel">Cancelar</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat — sin bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<!-- App scripts -->
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
